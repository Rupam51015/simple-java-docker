# Goal :
name: matrix
on: 
  workflow_dispatch:

jobs:
  code-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17','21','25']
    steps:
      - name: checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: setup java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Verify Compilation
        run: javac src/Main.java
